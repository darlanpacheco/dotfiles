{
  workspace = 1, default:true
}

{
  exec-once = gammastep -O 2750k
  exec-once = waybar
  exec-once = swaybg -i $HOME/wallpaper.png
  exec-once = flameshot
}

{
  bindel=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
  bindel=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
}

{
  bind = SUPERCTRL, Q, exit

  bind = SUPER, RETURN, exec, alacritty
  bind = SUPER, D, exec, xfce4-appfinder
  bind = SUPER, P, exec, flameshot gui

  bind = SUPER, F, fullscreen, active
  bind = SUPER, Q, closewindow, active

  bind = SUPER, Right, movefocus, r
  bind = SUPER, Up, movefocus, u
  bind = SUPER, Left, movefocus, l
  bind = SUPER, Down, movefocus, d

  bind = SUPER, 1, workspace, 1
  bind = SUPER, 2, workspace, 2
  bind = SUPER, 3, workspace, 3

  bind = SUPERCTRL, Right, movetoworkspace, +1
  bind = SUPERCTRL, Left, movetoworkspace, -1

  bind = SUPERSHIFT, Right, movewindow, r
  bind = SUPERSHIFT, Up, movewindow, u
  bind = SUPERSHIFT, Left, movewindow, l
  bind = SUPERSHIFT, Down, movewindow, d
}

input {
  kb_layout = br
}

general {
  gaps_in = 3
  gaps_out = 0
  border_size = 3

  layout = master

  col.inactive_border	= rgba(1e1e1eff)
  col.active_border	= rgba(ffffff95)
}

master {
  no_gaps_when_only = 1
}

decoration {
  drop_shadow = false
}

animations {
  enabled = false
}

env = XDG_CURRENT_DESKTOP,sway
env = XDG_SESSION_DESKTOP,sway
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,gtk3

env = GTK_THEME, adw-gtk3-dark
env = XCURSOR_SIZE, 24
env = XCURSOR_THEME, Adwaita
